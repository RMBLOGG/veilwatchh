name: veilwatch
description: Veilwatch - Anime Streaming App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1

  # Video Player (pengganti better_player)
  video_player: ^2.8.6
  chewie: ^1.7.5

  # UI
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  iconsax: ^0.0.8

  # Storage
  shared_preferences: ^2.2.3

  # Utils
  package_info_plus: ^8.1.2

flutter:
  uses-material-design: true
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf
        - asset: assets/fonts/Urbanist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Urbanist-Bold.ttf
          weight: 700
